# 名人名言 — 源自 Calibre 个人书库
# 每次页面加载随机展示一条

- text: "人生就像钟摆，在痛苦和无聊之间摆动。"
  author: 叔本华
  work: 《人生的智慧》

- text: "一个人自身拥有的越多，他对外界的需求就越少。"
  author: 叔本华
  work: 《人生的智慧》

- text: "健康的身体加上健康的心灵，才是真正的幸福。"
  author: 叔本华
  work: 《人生的智慧》

- text: "要得到你想要的东西，最可靠的办法是让自己配得上它。"
  author: 查理·芒格
  work: 《穷查理宝典》

- text: "反过来想，总是反过来想。"
  author: 查理·芒格
  work: 《穷查理宝典》

- text: "我这辈子遇到的聪明人没有不每天阅读的——没有，一个都没有。"
  author: 查理·芒格
  work: 《穷查理宝典》

- text: "重要的不是被给予了什么，而是如何去利用被给予的东西。"
  author: 岸见一郎 / 古贺史健
  work: 《被讨厌的勇气》

- text: "自由就是被别人讨厌。"
  author: 岸见一郎 / 古贺史健
  work: 《被讨厌的勇气》

- text: "人生不是与他人的比赛，而是与'理想的自己'的比赛。"
  author: 岸见一郎 / 古贺史健
  work: 《被讨厌的勇气》

- text: "人类以为自己驯化了小麦，但其实是小麦驯化了人类。"
  author: 尤瓦尔·赫拉利
  work: 《人类简史》

- text: "历史只告诉我们极少数人做的事，而大多数人都在默默地耕种。"
  author: 尤瓦尔·赫拉利
  work: 《人类简史》

- text: "如果你想要找到宇宙的秘密，就要从能量、频率和振动的角度去思考。"
  author: 尼古拉·特斯拉
  work: 《特斯拉自传》

- text: "真正的哲学不在书本里，而在如何面对生活。"
  author: 朱锐
  work: 《哲学家的最后一课》

- text: "这世界既残酷也温柔——残酷的是它不会为任何人停下脚步，温柔的是它为每个人都留了路。"
  author: 孙宇晨
  work: 《这世界既残酷也温柔》
