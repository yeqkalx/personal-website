{% include header.html %}

{% if site.layout == 'stacked' %}
  <div class="container page-content">
    <a href="{{ site.url }}{{ site.baseurl | append:'/' }}" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M10.78 12.78a.75.75 0 01-1.06 0L4.44 7.5a.75.75 0 010-1.06l5.28-5.28a.75.75 0 011.06 1.06L5.81 7l4.97 4.97a.75.75 0 010 1.06z"/></svg>
      Home
    </a>
    <h1>{{ page.title }}</h1>
    {{ content }}
  </div>
{% else %}
  <div class="d-md-flex min-height-full">
    <div class="flex-self-stretch col-md-5 col-lg-4 col-xl-3 px-4 px-md-6 px-lg-7 py-6">
      {% include masthead.html metadata=false %}
    </div>
    <div class="col-md-7 col-lg-8 col-xl-9 px-4 py-6 px-lg-7">
      <div class="mx-auto" style="max-width: 900px;">
        <a href="{{ site.url }}{{ site.baseurl | append:'/' }}" class="back-link">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M10.78 12.78a.75.75 0 01-1.06 0L4.44 7.5a.75.75 0 010-1.06l5.28-5.28a.75.75 0 011.06 1.06L5.81 7l4.97 4.97a.75.75 0 010 1.06z"/></svg>
          Home
        </a>
        <h1>{{ page.title }}</h1>
        {{ content }}
      </div>
    </div>
  </div>
{% endif %}

{% include footer.html %}
